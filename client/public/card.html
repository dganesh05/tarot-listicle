<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarot Card Details</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="/style.css">
    
    <script defer src="/scripts/card-detail.js"></script>
    <script defer src="/scripts/header.js"></script>
  </head>

  <body>
    <header class="page-header"></header>
    <div class="page-wrapper">
      <section class="hero" id="card-hero">
        <div class="hero-left" id="card-hero-left">
          <div class="hero-numeral" id="card-number">—</div>
        </div>
        <div class="hero-right" id="card-hero-right">
          <h1 id="card-name">Tarot Card</h1>
          <div class="hero-meta" id="card-meta"></div>
        </div>
      </section>

      <main class="container" id="card-content">
        <div class="card-layout">
          <aside class="card-image-col">
            <div class="card-image-sticky">
              <section class="section-block" id="section-image" data-dynamic-section>
                <div class="section-label">Card Image</div>
                <div class="section-body">
                  <div class="card-frame">
                    <img id="card-image" src="" alt="Tarot Card" />
                    <div class="card-frame-caption" id="card-caption">Rider-Waite-Smith</div>
                  </div>
                </div>
              </section>

              <section class="section-block" id="section-quick-facts" data-dynamic-section>
                <div class="section-label">Quick Facts</div>
                <div class="section-body quick-facts" id="quick-facts"></div>
              </section>

            <section class="section-block" id="section-numerology" data-dynamic-section hidden>
              <div class="section-label">Numerology</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-symbolism" data-dynamic-section hidden>
              <div class="section-label">Core Symbolism</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-correspondences" data-dynamic-section hidden>
              <div class="section-label">Correspondences</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-related" data-dynamic-section hidden>
              <div class="section-label">Related Cards</div>
              <div class="section-body"></div>
            </section>

            </div>
          </aside>

          <section class="card-detail-col" id="detail-sections">
            <section class="section-block" id="section-description" data-dynamic-section hidden>
              <div class="section-label">Card Description</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-affirmation" data-dynamic-section hidden>
              <div class="section-label">Affirmation</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-original" data-dynamic-section hidden>
              <div class="section-label">Historical Meaning</div>
              <div class="section-body"></div>
            </section>
          

            <section class="section-block" id="section-visual-symbols" data-dynamic-section hidden>
              <div class="section-label">Visual Symbolism</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-spirituality" data-dynamic-section hidden>
              <div class="section-label">Spiritual Significance</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-meanings" data-dynamic-section hidden>
              <div class="section-label">Meanings</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-reading" data-dynamic-section hidden>
              <div class="section-label">In a Reading</div>
              <div class="section-body"></div>
            </section>

            <section class="section-block" id="section-guidance" data-dynamic-section hidden>
              <div class="section-label">Guidance</div>
              <div class="section-body"></div>
            </section>

          </section>
        </div>
      </main>

      <footer class="page-footer" id="page-footer"></footer>
    </div>
  </body>
</html>
